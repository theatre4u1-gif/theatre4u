    {
      "@context": "https://schema.org",

          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Theatre4u is free to start with up to 25 inventory items and QR codes. Pro plans start at $15/month or $150/year for unlimited items, the Funding Tracker, Reports, and full Backstage Exchange access."
          }
        },
        {
          "@type": "Question",
          "name": "What is the Backstage Exchange?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Backstage Exchange is a private network where theatre programs can rent, loan, or sell items to each other. Browse what nearby programs have available, or list your own items to earn revenue or reduce costs for other programs."
          }
        },
        {
          "@type": "Question",
          "name": "Can students use Theatre4u to help manage inventory?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Theatre4u supports team roles: Stage Manager (add, edit, delete items), Crew (add and edit items), and House (view and add items). Invite students with a join code and assign the appropriate role."
          }
        },
        {
          "@type": "Question",
          "name": "Does Theatre4u work on mobile phones?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Theatre4u has a mobile app available at theatre4u.org/app. Install it on iPhone or Android from your browser using Add to Home Screen — no App Store download required."
          }
        }
      ]
    }
    </script>
