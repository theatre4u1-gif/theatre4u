    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Is ArtsTracker free for school arts programs?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. ArtsTracker is free to start with up to 25 inventory items and QR codes. ArtsTracker Pro is $59/month for one school with all five departments, and District plans start at $199/month for up to 6 schools. Purchase orders are accepted for districts."
          }
        },
        {
          "@type": "Question",
          "name": "Which arts programs does ArtsTracker support?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "ArtsTracker supports Theatre, Music, Dance, Visual Art, and student organizations such as booster clubs — each with its own categories, terminology, and resource exchange. One account can run multiple departments."
          }
        },
        {
          "@type": "Question",
          "name": "Can school districts manage multiple sites with ArtsTracker?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. District plans connect separate school accounts under one dashboard with district-wide reporting, internal loans between schools, arts facilitator roles, and funding rollups. Plans cover up to 6, 15, or 30 school sites."
          }
        },
        {
          "@type": "Question",
          "name": "Does ArtsTracker work on mobile phones?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. ArtsTracker has a mobile app available at artstracker.org/app. Install it on iPhone or Android from your browser using Add to Home Screen — no App Store download required."
          }
        }
      ]
    }
    </script>
