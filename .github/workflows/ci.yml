name: CI

# Runs on every push to main and on pull requests. Gives a green/red check in
# GitHub so a broken build, an undefined variable, a misused React hook, or a
# changed price is caught before it reaches production. Does not block Vercel.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm install
      - name: Build
        run: npm run build
      - name: Lint (fails only on errors, e.g. undefined vars / bad hooks)
        run: npm run lint
      - name: Unit tests (branding, plan gates, prices)
        run: npm test
